<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QARCODE Home</title>
    <link rel="icon" type="image/png" href="/qarcode.png">
    <link rel="stylesheet" href="/animations.css">
    <link rel="stylesheet" href="/style.css">
</head>
<body class="home-body">

    <div class="home-app-container">
        <header class="home-header">
            <h1 class="home-logo">QARCODE</h1>
            <div class="home-history-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#722F26" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
            </div>
        </header>

        <section class="home-action-section">
            <div class="home-card home-card-scan">
                <img src="/illustratraone.png" alt="Scan" class="home-card-img">
                <span class="home-card-label">SCAN</span>
            </div>
            <div class="home-card home-card-generate">
                <img src="/illustratratwo.png" alt="Generate" class="home-card-img">
                <span class="home-card-label">GENERATE</span>
            </div>
        </section>

        <section class="home-recent-section">
            <h2 class="home-section-title">Recent Scans</h2>
            
            <div class="home-list-container">
                <div class="home-list-item">
                    <div class="home-item-icon-wrapper home-bg-link">
                        <span class="home-item-icon">🔗</span>
                    </div>
                    <div class="home-item-details">
                        <p class="home-item-title">https://example.com/menu</p>
                        <p class="home-item-subtitle">Today, 10:42 AM</p>
                    </div>
                    <span class="home-tag">URL</span>
                </div>

                <div class="home-list-item">
                    <div class="home-item-icon-wrapper home-bg-barcode">
                        <span class="home-item-icon">║║</span>
                    </div>
                    <div class="home-item-details">
                        <p class="home-item-title">8901234567890</p>
                        <p class="home-item-subtitle">Yesterday, 3:15 PM</p>
                    </div>
                    <span class="home-tag">EAN-13</span>
                </div>

                <div class="home-list-item">
                    <div class="home-item-icon-wrapper home-bg-wifi">
                        <span class="home-item-icon">▦</span>
                    </div>
                    <div class="home-item-details">
                        <p class="home-item-title">WIFI:S:CoffeeShopNetwork;T:WPA;</p>
                        <p class="home-item-subtitle">Oct 24, 9:00 AM</p>
                    </div>
                    <span class="home-tag">WIFI</span>
                </div>
            </div>
        </section>

        <nav class="home-bottom-nav">
            <div class="home-nav-pill">
                <div class="home-nav-active">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#722F26" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                </div>
                <div class="home-nav-add">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#722F26" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg>
                </div>
            </div>
        </nav>
    </div>

    <script src="/navigation.js"></script>
</body>
</html>
