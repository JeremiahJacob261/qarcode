<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QARCODE - Scanner</title>
    <link rel="stylesheet" href="animations.css">
    <style>
        /* RESET & BASE */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        .cam-body {
            background-color: #000; /* Dark background for camera feel */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            overflow: hidden;
        }

        .cam-app-container {
            width: 100%;
            max-width: 414px;
            height: 100vh;
            position: relative;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), 
                        url('https://images.unsplash.com/photo-1622321592472-887707e71661?q=80&w=1000&auto=format&fit=crop') center/cover;
            /* The URL above is a placeholder for the live camera feed */
        }

        /* SCANNING FRAME */
        .cam-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.3);
        }

        .cam-viewfinder {
            width: 280px;
            height: 280px;
            position: relative;
            border-radius: 24px;
            /* Only corners visible */
            background: 
                linear-gradient(to right, #B23B2B 4px, transparent 4px) 0 0,
                linear-gradient(to bottom, #B23B2B 4px, transparent 4px) 0 0,
                linear-gradient(to left, #B23B2B 4px, transparent 4px) 100% 0,
                linear-gradient(to bottom, #B23B2B 4px, transparent 4px) 100% 0,
                linear-gradient(to right, #B23B2B 4px, transparent 4px) 0 100%,
                linear-gradient(to top, #B23B2B 4px, transparent 4px) 0 100%,
                linear-gradient(to left, #B23B2B 4px, transparent 4px) 100% 100%,
                linear-gradient(to top, #B23B2B 4px, transparent 4px) 100% 100%;
            background-repeat: no-repeat;
            background-size: 40px 40px;
        }

        .cam-scan-line {
            position: absolute;
            left: 10px;
            right: 10px;
            height: 2px;
            background: #B23B2B;
            box-shadow: 0 0 15px #B23B2B;
            animation: camMove 2.5s infinite ease-in-out;
            z-index: 5;
        }

        @keyframes camMove {
            0%, 100% { top: 20px; opacity: 0.8; }
            50% { top: 260px; opacity: 1; }
        }

        .cam-instruction {
            color: #FFFFFF;
            margin-top: 32px;
            font-size: 16px;
            font-weight: 500;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        /* CONTROLS */
        .cam-controls {
            position: absolute;
            bottom: 60px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 24px;
        }

        .cam-btn {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .cam-btn:active {
            transform: scale(0.9);
            background: rgba(255, 255, 255, 0.3);
        }

        .cam-btn-large {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.2);
        }

        /* HIDDEN FILE INPUT */
        #cam-gallery-input {
            display: none;
        }
    </style>
</head>
<body class="cam-body">

    <div class="cam-app-container">
        
        <div class="cam-overlay">
            <div class="cam-viewfinder">
                <div class="cam-scan-line"></div>
            </div>
            <p class="cam-instruction">Align QR code within the frame</p>
        </div>

        <div class="cam-controls">
            <button class="cam-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
                </svg>
            </button>

            <button class="cam-btn cam-btn-large" onclick="navigateWithAnimation(this, '/home', 'left')">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>

            <label for="cam-gallery-input" class="cam-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <circle cx="8.5" cy="8.5" r="1.5"></circle>
                    <polyline points="21 15 16 10 5 21"></polyline>
                </svg>
            </label>
            <input type="file" id="cam-gallery-input" accept="image/*">
        </div>

    </div>

    <script src="navigation.js"></script>
</body>
</html>
