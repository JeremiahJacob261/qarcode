<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QARCODE - History</title>
    <link rel="stylesheet" href="animations.css">
    <style>
        /* RESET */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        .hist-body {
            background-color: #F8F8F8;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            color: #1a1a1a;
        }

        .hist-app-container {
            width: 100%;
            max-width: 414px;
            background-color: #F8F9FA;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* HEADER */
        .hist-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            background-color: #fff;
        }

        .hist-logo {
            font-size: 20px;
            letter-spacing: 2px;
            font-weight: 700;
        }

        .hist-profile-icon {
            width: 32px;
            height: 32px;
            background-color: #B23B2B;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* SECTION TITLE ROW */
        .hist-title-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 32px 24px 16px;
        }

        .hist-main-title {
            font-size: 28px;
            font-weight: 800;
        }

        .hist-clear-btn {
            color: #B23B2B;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            border: none;
            background: none;
        }

        /* SEARCH BAR */
        .hist-search-container {
            padding: 0 24px 20px;
        }

        .hist-search-wrapper {
            display: flex;
            align-items: center;
            background: #FFFFFF;
            border: 1px solid #E0E0E0;
            border-radius: 12px;
            padding: 12px 16px;
        }

        .hist-search-input {
            border: none;
            outline: none;
            width: 100%;
            font-size: 16px;
            margin-left: 10px;
            color: #1a1a1a;
        }

        .hist-search-input::placeholder {
            color: #888;
        }

        /* FILTER CHIPS */
        .hist-filters {
            display: flex;
            gap: 10px;
            padding: 0 24px 24px;
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: none;
        }

        .hist-filters::-webkit-scrollbar { display: none; }

        .hist-chip {
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid #E0E0E0;
            background: #FFFFFF;
            color: #444;
        }

        .hist-chip-active {
            background: #D1D1D1;
            border-color: #D1D1D1;
            color: #1a1a1a;
        }

        /* HISTORY CARDS */
        .hist-list {
            padding: 0 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .hist-card {
            background: #FFFFFF;
            border: 1px solid #E0E0E0;
            border-radius: 20px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            position: relative;
        }

        .hist-icon-circle {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background-color: #FDF1EF;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
        }

        .hist-content {
            flex: 1;
            overflow: hidden;
        }

        .hist-item-title {
            font-size: 16px;
            font-weight: 600;
            line-height: 1.4;
            margin-bottom: 4px;
            word-break: break-all;
        }

        .hist-meta-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .hist-tag {
            font-size: 10px;
            font-weight: 700;
            background: #F0F0F0;
            padding: 2px 8px;
            border-radius: 4px;
            color: #666;
            text-transform: uppercase;
        }

        .hist-time {
            font-size: 12px;
            color: #888;
        }

        .hist-action-icon {
            opacity: 0.5;
            cursor: pointer;
            display: flex;
            align-items: center;
        }

        /* SVG STYLING */
        .hist-svg-icon {
            stroke: #B23B2B;
        }
    </style>
</head>
<body class="hist-body">

    <div class="hist-app-container">
        <header class="hist-header">
            <h1 class="hist-logo">QARCODE</h1>
            <div class="hist-profile-icon">
                <svg width="14" height="6" viewBox="0 0 14 6" fill="none"><rect width="14" height="2" rx="1" fill="white"/><rect y="4" width="10" height="2" rx="1" fill="white"/></svg>

        <div class="hist-title-row">

                </div>

                </div>

            <div class="hist-card">
                <div class="hist-icon-circle">

    <script src="navigation.js"></script>
</body>
</html>
