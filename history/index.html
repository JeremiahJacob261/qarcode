<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QARCODE - History</title>
    <link rel="icon" type="image/png" href="/qarcode.png">
    <link rel="stylesheet" href="/animations.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        .hist-body {
            background-color: #F8F8F8;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            color: #1a1a1a;
        }

        .hist-app-container {
            width: 100%;
            max-width: 414px;
            background-color: #F8F9FA;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        .hist-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            background-color: #fff;
        }

        .hist-logo {
            font-size: 20px;
            letter-spacing: 2px;
            font-weight: 700;
        }

        .hist-profile-icon {
            width: 32px;
            height: 32px;
            background-color: #B23B2B;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .hist-title-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 32px 24px 16px;
        }

        .hist-main-title {
            font-size: 28px;
            font-weight: 800;
        }

        .hist-clear-btn {
            color: #B23B2B;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            border: none;
            background: none;
        }

        .hist-search-container {
            padding: 0 24px 20px;
        }

        .hist-search-wrapper {
            display: flex;
            align-items: center;
            background: #FFFFFF;
            border: 1px solid #E0E0E0;
            border-radius: 12px;
            padding: 12px 16px;
        }

        .hist-search-input {
            border: none;
            outline: none;
            width: 100%;
            font-size: 16px;
            margin-left: 10px;
            color: #1a1a1a;
            background: transparent;
        }

        .hist-search-input::placeholder {
            color: #888;
        }

        .hist-filters {
            display: flex;
            gap: 10px;
            padding: 0 24px 24px;
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: none;
        }

        .hist-filters::-webkit-scrollbar {
            display: none;
        }

        .hist-chip {
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid #E0E0E0;
            background: #FFFFFF;
            color: #444;
        }

        .hist-chip-active {
            background: #D1D1D1;
            border-color: #D1D1D1;
            color: #1a1a1a;
        }

        .hist-list {
            padding: 0 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .hist-card {
            background: #FFFFFF;
            border: 1px solid #E0E0E0;
            border-radius: 20px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
        }

        .hist-icon-circle {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background-color: #FDF1EF;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
            overflow: hidden;
        }

        .hist-preview-thumb {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .hist-content {
            flex: 1;
            overflow: hidden;
        }

        .hist-item-title {
            font-size: 16px;
            font-weight: 600;
            line-height: 1.4;
            margin-bottom: 8px;
            word-break: break-word;
        }

        .hist-meta-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
        }

        .hist-tag {
            font-size: 10px;
            font-weight: 700;
            background: #F0F0F0;
            padding: 4px 8px;
            border-radius: 999px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .hist-time {
            font-size: 12px;
            color: #888;
        }

        .hist-actions {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .hist-action-btn {
            border: none;
            background: #F7F7F7;
            width: 36px;
            height: 36px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .hist-action-btn svg {
            stroke: #7A342A;
        }

        .hist-empty-state {
            background: #FFFFFF;
            border: 1px dashed #D9D9D9;
            border-radius: 20px;
            padding: 32px 24px;
            text-align: center;
            color: #666;
        }

        .hist-empty-state h3 {
            font-size: 20px;
            margin-bottom: 10px;
            color: #1A1A1A;
        }

        .hist-empty-state p {
            line-height: 1.5;
        }
    </style>
</head>
<body class="hist-body">

    <div class="hist-app-container">
        <header class="hist-header">
            <h1 class="hist-logo">QARCODE</h1>
            <div class="hist-profile-icon">
                <svg width="14" height="6" viewBox="0 0 14 6" fill="none"><rect width="14" height="2" rx="1" fill="white"/><rect y="4" width="10" height="2" rx="1" fill="white"/></svg>
            </div>
        </header>

        <div class="hist-title-row">
            <h2 class="hist-main-title">History</h2>
            <button class="hist-clear-btn" type="button">Clear All</button>
        </div>

        <div class="hist-search-container">
            <div class="hist-search-wrapper">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" class="hist-search-input" placeholder="Search scans and generated codes...">
            </div>
        </div>

        <div class="hist-filters">
            <button class="hist-chip hist-chip-active" type="button" data-filter="all">All</button>
            <button class="hist-chip" type="button" data-filter="qr">QR Codes</button>
            <button class="hist-chip" type="button" data-filter="barcode">Barcodes</button>
            <button class="hist-chip" type="button" data-filter="scan">Scans</button>
            <button class="hist-chip" type="button" data-filter="generate">Generated</button>
        </div>

        <div class="hist-list" id="hist-list"></div>
    </div>

    <script src="/historyManager.js"></script>
    <script src="/navigation.js"></script>
    <script>
        const historyList = document.getElementById('hist-list');
        const searchInput = document.querySelector('.hist-search-input');
        const clearButton = document.querySelector('.hist-clear-btn');
        const chips = Array.from(document.querySelectorAll('.hist-chip'));

        const historyState = {
            filter: 'all',
            query: ''
        };

        function escapeHtml(value) {
            return String(value)
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;');
        }

        function getTypeLabel(type) {
            return type === 'barcode' ? 'Barcode' : 'QR';
        }

        function getActionLabel(action) {
            return action === 'generate' ? 'Generated' : 'Scanned';
        }

        function formatCodeFormat(format) {
            if (!format) {
                return '';
            }

            return format
                .replaceAll('_', ' ')
                .replace(/\b\w/g, (match) => match.toUpperCase());
        }

        function getIconMarkup(item) {
            if (item.image) {
                return `<img class="hist-preview-thumb" src="${item.image}" alt="${getTypeLabel(item.type)} preview">`;
            }

            if (item.type === 'barcode') {
                return `
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#B23B2B" stroke-width="2">
                        <line x1="4" y1="5" x2="4" y2="19"></line>
                        <line x1="8" y1="5" x2="8" y2="19"></line>
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="14" y1="5" x2="14" y2="19"></line>
                        <line x1="17" y1="5" x2="17" y2="19"></line>
                        <line x1="20" y1="5" x2="20" y2="19"></line>
                    </svg>
                `;
            }

            return `
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#B23B2B" stroke-width="2">
                    <rect x="3" y="3" width="6" height="6" rx="1"></rect>
                    <rect x="15" y="3" width="6" height="6" rx="1"></rect>
                    <rect x="3" y="15" width="6" height="6" rx="1"></rect>
                    <path d="M15 15h2v2h-2v-2zM18 18h3v3h-3v-3zM15 18h2v2h-2v-2zM18 15h3v3h-3v-3z"></path>
                </svg>
            `;
        }

        function matchesFilter(item) {
            if (historyState.filter === 'all') return true;
            return item.type === historyState.filter || item.action === historyState.filter;
        }

        function matchesQuery(item) {
            if (!historyState.query) return true;
            const haystack = [item.value, item.type, item.action, item.format || ''].join(' ').toLowerCase();
            return haystack.includes(historyState.query);
        }

        function getFilteredHistory() {
            return historyManager
                .getHistory()
                .filter(matchesFilter)
                .filter(matchesQuery);
        }

        function renderEmptyState() {
            historyList.innerHTML = `
                <div class="hist-empty-state">
                    <h3>No history found</h3>
                    <p>Try another filter, or scan and generate a few codes to start building your activity feed.</p>
                </div>
            `;
        }

        function renderHistory() {
            const items = getFilteredHistory();

            if (!items.length) {
                renderEmptyState();
                return;
            }

            historyList.innerHTML = items.map((item) => `
                <div class="hist-card" data-id="${item.id}">
                    <div class="hist-icon-circle">
                        ${getIconMarkup(item)}
                    </div>
                    <div class="hist-content">
                        <p class="hist-item-title">${escapeHtml(item.value)}</p>
                        <div class="hist-meta-row">
                            <span class="hist-tag">${getTypeLabel(item.type)}</span>
                            <span class="hist-tag">${getActionLabel(item.action)}</span>
                            ${item.format ? `<span class="hist-tag">${formatCodeFormat(item.format)}</span>` : ''}
                            <span class="hist-time">${historyManager.formatTime(item.timestamp)}</span>
                        </div>
                    </div>
                    <div class="hist-actions">
                        <button class="hist-action-btn" type="button" data-action="copy" data-id="${item.id}" title="Copy value">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                            </svg>
                        </button>
                        <button class="hist-action-btn" type="button" data-action="delete" data-id="${item.id}" title="Delete item">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="3 6 5 6 21 6"></polyline>
                                <path d="M19 6l-1 14H6L5 6"></path>
                                <path d="M10 11v6"></path>
                                <path d="M14 11v6"></path>
                                <path d="M9 6V4h6v2"></path>
                            </svg>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        async function copyItemValue(id) {
            const item = historyManager.getHistory().find((entry) => String(entry.id) === String(id));
            if (!item) return;

            try {
                await navigator.clipboard.writeText(item.value);
            } catch (error) {
                console.error('Copy failed:', error);
            }
        }

        chips.forEach((chip) => {
            chip.addEventListener('click', () => {
                historyState.filter = chip.dataset.filter;
                chips.forEach((item) => item.classList.toggle('hist-chip-active', item === chip));
                renderHistory();
            });
        });

        searchInput.addEventListener('input', (event) => {
            historyState.query = event.target.value.trim().toLowerCase();
            renderHistory();
        });

        clearButton.addEventListener('click', () => {
            if (!historyManager.getHistory().length) return;

            const confirmed = window.confirm('Clear your entire QARCODE history?');
            if (!confirmed) return;

            historyManager.clearHistory();
            renderHistory();
        });

        historyList.addEventListener('click', async (event) => {
            const actionButton = event.target.closest('[data-action]');

            if (actionButton) {
                event.stopPropagation();
                const { action, id } = actionButton.dataset;

                if (action === 'copy') {
                    await copyItemValue(id);
                    return;
                }

                if (action === 'delete') {
                    historyManager.deleteItem(Number(id));
                    renderHistory();
                }
                return;
            }

            const card = event.target.closest('.hist-card');
            if (!card) return;

            const item = historyManager.getHistory().find((entry) => String(entry.id) === card.dataset.id);
            if (!item) return;

            sessionStorage.setItem('lastResult', JSON.stringify(item));
            navigateWithAnimation(card, '/result', 'right');
        });

        renderHistory();
    </script>
</body>
</html>
