<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QARCODE - Onboarding</title>
    <link rel="stylesheet" href="animations.css">
    <link rel="stylesheet" href="onboarding.css">
</head>
<body class="onb-body">

    <div class="onb-app-container">
        
        <div class="onb-illustration-container">
            <div class="onb-card">
                <div class="onb-scan-graphic">
                    <div class="onb-scan-line"></div>
                    
                    <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="#B23B2B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 3h6v6H3V3zm0 12h6v6H3v-6zM15 3h6v6h-6V3zm3 12h.01M15 15h2v2h-2v-2zm3 3h3v3h-3v-3zm-3 0h2v2h-2v-2zm3-3h3v3h-3v-3z"/>
                    </svg>
                </div>
            </div>
        </div>

        <div class="onb-text-content">
            <h1 class="onb-title">Fast & Reliable Scanning</h1>
            <p class="onb-subtitle">Scan any barcode or QR code in milliseconds.</p>
        </div>

        <div class="onb-footer">
            <div class="onb-pagination">
                <div class="onb-dot onb-dot-active"></div>
                <div class="onb-dot"></div>
                <div class="onb-dot"></div>
            </div>

            <button class="onb-primary-btn">Next</button>
        </div>

    </div>

    <script src="navigation.js"></script>
</body>
</html>
