<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QARCODE - Generate</title>
    <link rel="icon" type="image/png" href="/assets/qarcode-yAM2zWOn.png">
  <link rel="stylesheet" crossorigin href="/assets/generate-DqPbDPXw.css">
  <link rel="stylesheet" crossorigin href="/assets/animations-BKboK-tu.css">
</head>
<body class="gen-body">

    <div class="gen-app-container">
        <header class="gen-header">
            <h1 class="gen-logo">QARCODE</h1>
            <div class="gen-history-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#722F26" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
            </div>
        </header>

        <main class="gen-content">
            <h2 class="gen-title">Generate Code</h2>
            <p class="gen-subtitle">Enter your data below to create a new code instantly.</p>

            <div class="gen-toggle-container">
                <button class="gen-toggle-btn gen-active" data-code-type="qr" type="button">QR Code</button>
                <button class="gen-toggle-btn" data-code-type="barcode" type="button">Barcode</button>
            </div>

            <div class="gen-input-group">
                <label class="gen-label" for="gen-textarea">Data Content</label>
                <textarea class="gen-textarea" id="gen-textarea" placeholder="Enter URL, text, or contact info..."></textarea>
            </div>

            <p class="gen-feedback" aria-live="polite"></p>
            <button class="gen-primary-btn" type="button" data-generate-action="true">Generate</button>

            <div class="gen-preview-card">
                <div class="gen-placeholder-content">
                    <svg class="gen-placeholder-icon" width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="#BDBDBD" stroke-width="1.5">
                        <path d="M3 3h6v6H3V3zm0 12h6v6H3v-6zM15 3h6v6h-6V3zm3 12h.01M15 15h2v2h-2v-2zm3 3h3v3h-3v-3zm-3 0h2v2h-2v-2zm3-3h3v3h-3v-3z"/>
                    </svg>
                    <p class="gen-placeholder-text">Your generated code will<br>appear here</p>
                </div>
                <canvas class="gen-preview-canvas" aria-label="Generated code preview"></canvas>
            </div>
        </main>
    </div>

    <script src="/historyManager.js"></script>
    <script src="/vendor/qrcode-generator.js"></script>
    <script src="/vendor/JsBarcode.all.min.js"></script>
    <script src="/generatorModule.js"></script>
    <script src="/navigation.js"></script>
    <script>
        const generateState = {
            codeType: 'qr'
        };

        const toggleButtons = Array.from(document.querySelectorAll('.gen-toggle-btn'));
        const textarea = document.getElementById('gen-textarea');
        const generateButton = document.querySelector('.gen-primary-btn');
        const previewCard = document.querySelector('.gen-preview-card');
        const placeholder = document.querySelector('.gen-placeholder-content');
        const previewCanvas = document.querySelector('.gen-preview-canvas');
        const feedback = document.querySelector('.gen-feedback');

        function getGeneratorFormat() {
            return generateState.codeType === 'barcode' ? 'CODE128' : 'qr_code';
        }

        function setFeedback(message, isError = false) {
            feedback.textContent = message;
            feedback.classList.toggle('gen-feedback-error', isError);
        }

        function updateToggleButtons() {
            toggleButtons.forEach((button) => {
                button.classList.toggle('gen-active', button.dataset.codeType === generateState.codeType);
            });
        }

        function renderPreview() {
            const value = textarea.value.trim();

            if (!value) {
                placeholder.hidden = false;
                previewCanvas.classList.remove('gen-preview-canvas-visible');
                previewCard.classList.remove('gen-preview-card-ready');
                setFeedback('');
                return false;
            }

            try {
                if (generateState.codeType === 'qr') {
                    generator.generateQRCode(value, previewCanvas);
                } else {
                    generator.generateBarcode(value, previewCanvas, getGeneratorFormat());
                }
            } catch (error) {
                placeholder.hidden = false;
                previewCanvas.classList.remove('gen-preview-canvas-visible');
                previewCard.classList.remove('gen-preview-card-ready');
                setFeedback(error.message || 'Unable to generate that code.', true);
                return false;
            }

            placeholder.hidden = true;
            previewCanvas.classList.add('gen-preview-canvas-visible');
            previewCard.classList.add('gen-preview-card-ready');
            setFeedback(`${generateState.codeType === 'qr' ? 'QR code' : 'Barcode'} preview ready.`);
            return true;
        }

        function buildGeneratedPayload() {
            return {
                type: generateState.codeType,
                action: 'generate',
                format: getGeneratorFormat(),
                value: textarea.value.trim(),
                timestamp: new Date().toISOString(),
                image: generator.canvasToBase64(previewCanvas)
            };
        }

        toggleButtons.forEach((button) => {
            button.addEventListener('click', () => {
                generateState.codeType = button.dataset.codeType;
                updateToggleButtons();
                renderPreview();
            });
        });

        textarea.addEventListener('input', renderPreview);

        generateButton.addEventListener('click', () => {
            const value = textarea.value.trim();

            if (!value) {
                setFeedback('Enter some text or a URL before generating.', true);
                textarea.focus();
                return;
            }

            const previewReady = renderPreview();
            if (!previewReady) {
                return;
            }

            const payload = buildGeneratedPayload();
            historyManager.addToHistory(payload);
            sessionStorage.setItem('lastGenerated', JSON.stringify(payload));
            sessionStorage.setItem('lastResult', JSON.stringify(payload));

            navigateWithAnimation(generateButton, '/result/', 'right');
        });

        updateToggleButtons();
        renderPreview();
    </script>
</body>
</html>
